<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Baby Dragon's Vocabulary Journey</title>
    <style>
        /* --- CSS STYLES --- */
        :root {
            --bg-color: #f0f9ff;
            --cave-color: #4a148c;
            --forest-color: #2e7d32;
            --sky-color: #0288d1;
            --button-primary: #ff7043;
            --button-secondary: #ffb74d;
            --correct-green: #66bb6a;
            --wrong-red: #ef5350;
            --text-dark: #37474f;
        }

        * {
            box-sizing: border-box;
            font-family: 'Comic Sans MS', 'Chalkboard SE', 'cursive', sans-serif;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        #game-container {
            width: 100%;
            max-width: 500px;
            height: 95vh;
            background: white;
            border-radius: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            position: relative;
            display: flex;
            flex-direction: column;
            border: 8px solid #fff;
            overflow-y: auto;
        }

        /* Screens */
        .screen {
            display: none;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            text-align: center;
            width: 100%;
            height: 100%;
            animation: fadeIn 0.5s ease-in;
        }

        .active { display: flex; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Visuals */
        .illustration-box {
            width: 200px;
            height: 200px;
            margin: 20px 0;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #fdfdfd;
            border-radius: 20px;
        }

        svg { width: 100%; height: 100%; }

        /* Text Styles */
        h1 { color: var(--cave-color); font-size: 28px; margin-bottom: 10px; }
        p { color: var(--text-dark); font-size: 20px; line-height: 1.4; margin: 10px 0; }
        .question-text { font-weight: bold; font-size: 22px; color: #1565c0; margin-top: 20px; }
        
        .blank {
            display: inline-block;
            width: 100px;
            border-bottom: 3px solid #333;
            vertical-align: bottom;
            margin-left: 5px;
            color: var(--correct-green);
        }

        /* Buttons */
        .button-stack {
            display: flex;
            flex-direction: column;
            width: 100%;
            gap: 15px;
            margin-top: 25px;
            padding-bottom: 20px;
        }

        button {
            padding: 20px;
            font-size: 24px;
            font-weight: bold;
            color: white;
            background-color: var(--button-primary);
            border: none;
            border-radius: 20px;
            cursor: pointer;
            box-shadow: 0 6px 0 #d84315;
            transition: all 0.1s;
            width: 100%;
        }

        button:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #d84315;
        }

        .opt-btn { background-color: var(--sky-color); box-shadow: 0 6px 0 #01579b; }

        /* Feedback */
        #feedback-area {
            font-size: 24px;
            font-weight: bold;
            height: 40px;
            margin-top: 10px;
            color: var(--correct-green);
        }

        /* Shake animation for wrong answer */
        .shake { animation: shakeAnim 0.4s; }
        @keyframes shakeAnim {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        /* Confetti for final screen */
        .confetti-piece {
            position: absolute;
            width: 10px; height: 10px;
            background: yellow;
            top: -10px;
            opacity: 0.7;
            border-radius: 50%;
            animation: confettiFall 3s linear infinite;
        }

        @keyframes confettiFall {
            to { transform: translateY(100vh) rotate(360deg); }
        }
    </style>
</head>
<body>

<div id="game-container">
    
    <!-- START SCREEN -->
    <div id="start-screen" class="screen active" style="background: linear-gradient(#e1bee7, #f3e5f5);">
        <h1>🐉 Welcome!</h1>
        <div class="illustration-box">
            <!-- Baby Dragon SVG -->
            <svg viewBox="0 0 100 100">
                <circle cx="50" cy="50" r="40" fill="#9c27b0" />
                <circle cx="35" cy="40" r="5" fill="white" />
                <circle cx="65" cy="40" r="5" fill="white" />
                <path d="M40 70 Q50 80 60 70" stroke="white" stroke-width="3" fill="none" />
                <path d="M20 30 L30 40 M80 30 L70 40" stroke="#ba68c8" stroke-width="5" />
            </svg>
        </div>
        <p>A baby dragon wakes up and wants to find its family. Help it explore the magical world!</p>
        <div class="button-stack">
            <button onclick="startGame()">Start Adventure</button>
        </div>
    </div>

    <!-- CHAPTER SCREEN (Generic for all levels) -->
    <div id="game-screen" class="screen">
        <h1 id="chapter-title">Chapter 1</h1>
        <div id="illustration" class="illustration-box"></div>
        <p id="story-text"></p>
        <p class="question-text"><span id="q-body"></span><span id="q-blank" class="blank"></span>.</p>
        
        <div id="feedback-area"></div>

        <div class="button-stack">
            <button id="opt1" class="opt-btn" onclick="checkAnswer(0)"></button>
            <button id="opt2" class="opt-btn" onclick="checkAnswer(1)"></button>
        </div>
    </div>

    <!-- FINAL SCREEN -->
    <div id="final-screen" class="screen" style="background: linear-gradient(#fff9c4, #fffde7);">
        <h1>🎉 Hooray!</h1>
        <div class="illustration-box">
            <svg viewBox="0 0 100 100">
                <circle cx="30" cy="50" r="20" fill="#9c27b0" />
                <circle cx="70" cy="50" r="25" fill="#7b1fa2" />
                <path d="M45 50 H55" stroke="#333" stroke-width="2" />
            </svg>
        </div>
        <p>The baby dragon found its home! Thank you for helping!</p>
        <div class="button-stack">
            <button onclick="resetGame()">Play Again</button>
        </div>
    </div>

</div>

<script>
    /* --- JAVASCRIPT LOGIC --- */

    // SVG Illustration Library
    const SVGS = {
        rabbit: `<svg viewBox="0 0 100 100"><ellipse cx="50" cy="60" rx="25" ry="20" fill="#ddd"/><ellipse cx="35" cy="35" rx="7" ry="20" fill="#ddd"/><ellipse cx="65" cy="35" rx="7" ry="20" fill="#ddd"/><circle cx="40" cy="55" r="3" fill="#333"/><circle cx="60" cy="55" r="3" fill="#333"/><circle cx="50" cy="65" r="3" fill="pink"/></svg>`,
        owl: `<svg viewBox="0 0 100 100"><circle cx="50" cy="55" r="30" fill="#795548"/><circle cx="40" cy="45" r="8" fill="white"/><circle cx="60" cy="45" r="8" fill="white"/><circle cx="40" cy="45" r="3" fill="black"/><circle cx="60" cy="45" r="3" fill="black"/><path d="M45 55 L50 65 L55 55" fill="orange"/></svg>`,
        frog: `<svg viewBox="0 0 100 100"><ellipse cx="50" cy="65" rx="35" ry="25" fill="#4caf50"/><circle cx="35" cy="40" r="10" fill="#4caf50"/><circle cx="65" cy="40" r="10" fill="#4caf50"/><circle cx="35" cy="40" r="4" fill="black"/><circle cx="65" cy="40" r="4" fill="black"/><path d="M35 70 Q50 80 65 70" stroke="#1b5e20" stroke-width="3" fill="none"/></svg>`,
        blueTable: `<svg viewBox="0 0 100 100"><rect x="15" y="40" width="70" height="15" fill="#0288d1"/><rect x="20" y="55" width="8" height="30" fill="#01579b"/><rect x="72" y="55" width="8" height="30" fill="#01579b"/></svg>`,
        yellowBall: `<svg viewBox="0 0 100 100"><circle cx="50" cy="50" r="35" fill="#fbc02d"/><path d="M25 35 Q50 50 75 35" stroke="#f57f17" stroke-width="4" fill="none"/></svg>`,
        key: `<svg viewBox="0 0 100 100"><circle cx="35" cy="50" r="15" fill="none" stroke="#ffd600" stroke-width="8"/><rect x="50" y="46" width="35" height="8" fill="#ffd600"/><rect x="70" y="54" width="6" height="10" fill="#ffd600"/><rect x="80" y="54" width="6" height="10" fill="#ffd600"/></svg>`,
        mushroom: `<svg viewBox="0 0 100 100"><rect x="42" y="60" width="16" height="30" fill="#eee"/><path d="M20 60 Q50 10 80 60" fill="#f44336"/><circle cx="40" cy="35" r="4" fill="white"/><circle cx="60" cy="45" r="4" fill="white"/><circle cx="50" cy="50" r="4" fill="white"/></svg>`,
        apple: `<svg viewBox="0 0 100 100"><circle cx="50" cy="55" r="35" fill="#d32f2f"/><path d="M50 25 V15" stroke="#5d4037" stroke-width="5"/><path d="M50 20 Q65 10 60 25" fill="#4caf50"/></svg>`,
        carriage: `<svg viewBox="0 0 100 100"><rect x="20" y="30" width="60" height="40" rx="10" fill="#ce93d8" stroke="#8e24aa" stroke-width="3"/><circle cx="35" cy="75" r="12" fill="#333" stroke="white" stroke-width="3"/><circle cx="65" cy="75" r="12" fill="#333" stroke="white" stroke-width="3"/><rect x="80" y="50" width="10" height="5" fill="#8e24aa"/></svg>`,
        unicorn: `<svg viewBox="0 0 100 100"><path d="M30 80 Q50 20 80 40" stroke="#f3e5f5" stroke-width="20" fill="none" stroke-linecap="round"/><circle cx="70" cy="40" r="12" fill="#f3e5f5"/><path d="M75 25 L85 10 L65 25" fill="gold"/><circle cx="75" cy="38" r="2" fill="black"/></svg>`
    };

    // Level Data
    const levels = [
        { title: "Chapter 1", story: "The dragon sees an animal hopping around.", body: "This animal hops. It is a ", visual: SVGS.rabbit, options: ["Rabbit", "Dog"], correct: 0, feedback: "Great job! 👏👏👏👏👏" },
        { title: "Chapter 2", story: "A creature watches quietly from a tree at night.", body: "This animal flies at night. It is an ", visual: SVGS.owl, options: ["Owl", "Cat"], correct: 0, feedback: "Amazing! 👏👏👏👏👏" },
        { title: "Chapter 3", story: "A small animal jumps near the water.", body: "This animal jumps and lives near water. It is a ", visual: SVGS.frog, options: ["Frog", "Horse"], correct: 0, feedback: "Nice! 👏👏👏👏👏" },
        { title: "Chapter 4", story: "The dragon finds a colorful object.", body: "What colour is this? It is ", visual: SVGS.blueTable, options: ["Blue", "Red"], correct: 0, feedback: "You got it! 👏👏👏👏👏" },
        { title: "Chapter 5", story: "The dragon finds something round on the grass.", body: "This ball is ", visual: SVGS.yellowBall, options: ["Yellow", "Green"], correct: 0, feedback: "Correct! 👏👏👏👏👏" },
        { title: "Chapter 6", story: "The dragon finds a shiny tool near the door.", body: "This opens a door. It is a ", visual: SVGS.key, options: ["Key", "Wand"], correct: 0, feedback: "Smart! 👏👏👏👏👏" },
        { title: "Chapter 7", story: "This is growing under a big tree.", body: "This grows in the forest. It is a ", visual: SVGS.mushroom, options: ["Mushroom", "Rock"], correct: 0, feedback: "Good job! 👏👏👏👏👏" },
        { title: "Chapter 8", story: "The dragon is hungry! Help it find food.", body: "This is a fruit. It is an ", visual: SVGS.apple, options: ["Apple", "Carrot"], correct: 0, feedback: "Yummy! 👏👏👏👏👏" },
        { title: "Chapter 9", story: "Look! A magical car is here to help.", body: "This carries people. It is a ", visual: SVGS.carriage, options: ["Carriage", "Boat"], correct: 0, feedback: "Let’s go! 👏👏👏👏👏" },
        { title: "Chapter 10", story: "The dragon meets a magical new friend.", body: "This magical animal has a horn. It is a ", visual: SVGS.unicorn, options: ["Unicorn", "Fairy"], correct: 0, feedback: "Perfect! 👏👏👏👏👏" }
    ];

    let currentLevel = 0;
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    function startGame() {
        showScreen('game-screen');
        loadLevel();
    }

    function loadLevel() {
        const level = levels[currentLevel];
        document.getElementById('chapter-title').innerText = level.title;
        document.getElementById('illustration').innerHTML = level.visual;
        document.getElementById('story-text').innerText = level.story;
        document.getElementById('q-body').innerText = level.body;
        document.getElementById('q-blank').innerText = "";
        document.getElementById('opt1').innerText = level.options[0];
        document.getElementById('opt2').innerText = level.options[1];
        document.getElementById('feedback-area').innerText = "";
        
        // Ensure buttons are reset from any previous wrong answer states
        document.getElementById('opt1').disabled = false;
        document.getElementById('opt2').disabled = false;
        document.getElementById('game-screen').classList.remove('shake');
    }

    function checkAnswer(index) {
        const level = levels[currentLevel];
        if (index === level.correct) {
            // Correct logic
            playCorrectSound();
            document.getElementById('q-blank').innerText = level.options[index];
            document.getElementById('feedback-area').innerText = level.feedback;
            document.getElementById('opt1').disabled = true;
            document.getElementById('opt2').disabled = true;

            setTimeout(() => {
                currentLevel++;
                if (currentLevel < levels.length) {
                    loadLevel();
                } else {
                    showScreen('final-screen');
                    startConfetti();
                }
            }, 2000);
        } else {
            // Wrong logic
            playWrongSound();
            const screen = document.getElementById('game-screen');
            screen.classList.remove('shake');
            void screen.offsetWidth; // Trigger reflow to restart animation
            screen.classList.add('shake');
            document.getElementById('feedback-area').style.color = 'var(--wrong-red)';
            document.getElementById('feedback-area').innerText = "Oops! Try again!";
            setTimeout(() => {
                document.getElementById('feedback-area').innerText = "";
                document.getElementById('feedback-area').style.color = 'var(--correct-green)';
            }, 1000);
        }
    }

    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function resetGame() {
        currentLevel = 0;
        // Remove confetti
        const pieces = document.querySelectorAll('.confetti-piece');
        pieces.forEach(p => p.remove());
        // Go to start
        showScreen('start-screen');
    }

    /* --- Sound Synth Functions --- */
    function playCorrectSound() {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.frequency.setValueAtTime(523.25, audioCtx.currentTime); // C5
        osc.frequency.exponentialRampToValueAtTime(880, audioCtx.currentTime + 0.5); // A5
        gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.5);
    }

    function playWrongSound() {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.frequency.setValueAtTime(150, audioCtx.currentTime);
        gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.3);
    }

    function startConfetti() {
        for(let i=0; i<30; i++) {
            const c = document.createElement('div');
            c.className = 'confetti-piece';
            c.style.left = Math.random() * 100 + 'vw';
            c.style.backgroundColor = `hsl(${Math.random() * 360}, 100%, 50%)`;
            c.style.animationDelay = Math.random() * 2 + 's';
            document.getElementById('final-screen').appendChild(c);
        }
    }
</script>

</body>
</html>
